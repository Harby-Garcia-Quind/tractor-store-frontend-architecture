<main class="min-h-screen bg-app-bg text-app-text font-sans">
  <section class="mx-auto max-w-4xl px-page py-section">
    <h1 class="mb-6 text-3xl font-bold text-app-text">Your Cart</h1>

    @if (cart(); as c) {
    <div
      class="overflow-hidden rounded-card border border-app-border bg-app-surface shadow-card"
    >
      <table class="w-full border-collapse">
        <thead>
          <tr class="border-b border-app-border">
            <th class="px-6 py-3 text-left text-sm font-bold text-app-muted">
              Product
            </th>
            <th class="px-6 py-3 text-right text-sm font-bold text-app-muted">
              Unit Price
            </th>
            <th class="px-6 py-3 text-right text-sm font-bold text-app-muted">
              Qty
            </th>
            <th class="px-6 py-3 text-right text-sm font-bold text-app-muted">
              Subtotal
            </th>
          </tr>
        </thead>
        <tbody>
          @for (item of c.items; track item.id) {
            <tr class="border-b border-app-border last:border-0">
              <td class="px-6 py-4">
                <p class="font-semibold text-app-text">{{ item.name }}</p>
                <p class="text-sm text-app-muted">{{ item.sku }}</p>
              </td>
              <td class="px-6 py-4 text-right text-app-text">
                {{ formatMoney(item.price) }}
              </td>
              <td class="px-6 py-4 text-right text-app-text">
                {{ item.quantity }}
              </td>
              <td class="px-6 py-4 text-right font-bold text-app-text">
                {{ lineSubtotal(item) }}
              </td>
            </tr>
          }
        </tbody>
        <tfoot>
          <tr class="bg-app-bg">
            <td
              colspan="3"
              class="px-6 py-4 text-right font-bold text-app-text"
            >
              Total
            </td>
            <td
              class="px-6 py-4 text-right text-xl font-bold text-primary"
            >
              {{ formatMoney(c.subtotal) }}
            </td>
          </tr>
        </tfoot>
      </table>
    </div>

    <div class="mt-6 flex justify-end">
      <ts-button
        (click)="goToCheckout()"
        (keydown.enter)="goToCheckout()"
      >
        Go to checkout
      </ts-button>
    </div>
    }
  </section>
</main>
