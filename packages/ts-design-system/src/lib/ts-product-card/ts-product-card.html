<article class="ts-product-card">
  <img
    class="ts-product-card__image"
    [src]="product().primaryImageUrl"
    [alt]="product().name"
  />

  <div class="ts-product-card__body">
    <h3 class="ts-product-card__title">{{ product().name }}</h3>

    <p class="ts-product-card__meta">
      {{ product().brand }} &middot; {{ product().category }}
    </p>

    <p class="ts-product-card__price">
      {{ formatMoney(product().basePrice) }}
    </p>

    <div class="ts-product-card__actions">
      <ts-button (click)="onSelect()" (keydown.enter)="onSelect()">View Product</ts-button>
    </div>
  </div>
</article>
