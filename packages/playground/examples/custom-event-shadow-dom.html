<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>CustomEvent + Shadow DOM</h1>

    <tractor-product-card></tractor-product-card>

    <script>
      class TractorProductCard extends HTMLElement {
        constructor() {
          super();

          const shadow = this.attachShadow({ mode: "open" });

          shadow.innerHTML = `
            <style>
              button {
                padding: 8px 12px;
                cursor: pointer;
              }
            </style>

            <article>
              <h2>Big Tractor 5000</h2>
              <button>Add to cart</button>
            </article>
          `;

          const button = shadow.querySelector("button");

          button.addEventListener("click", () => {
            const event = new CustomEvent("cart:add-item-requested", {
              detail: {
                productId: "tractor-001",
                variantId: "variant-001",
                quantity: 1,
              },
              bubbles: true,
              composed: true,
            });

            button.dispatchEvent(event);
          });
        }
      }

      customElements.define("tractor-product-card", TractorProductCard);

      document.addEventListener("cart:add-item-requested", (event) => {
        console.log("Document received event:", event.detail);
      });
    </script>
  </body>
</html>
