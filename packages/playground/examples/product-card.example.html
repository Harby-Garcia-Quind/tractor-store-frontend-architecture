<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tractor Product Card</title>
    <link rel="stylesheet" href="../public/product-card.css" />
  </head>

  <body>
    <article class="product-card product-card--featured">
      <img
        class="product-card__image"
        src="https://placehold.co/600x400?text=Tractor"
        alt="Big Tractor 5000"
      />

      <div class="product-card__content">
        <h2 class="product-card__title">Big Tractor 5000</h2>

        <p class="product-card__brand">Tractor Corp</p>

        <p class="product-card__price">$25,000 USD</p>

        <div class="product-card__actions">
          <button class="product-card__button">
            View product
          </button>
        </div>
      </div>
    </article>
  </body>
</html>
