<main class="min-h-screen bg-app-bg text-app-text font-sans">
  <section class="mx-auto max-w-7xl px-page py-section">
    <div
      class="rounded-card border border-app-border bg-app-surface p-section shadow-card"
    >
      <p class="mb-2 text-sm font-bold uppercase tracking-widest text-primary">
        Tractor Store
      </p>

      <h1 class="max-w-4xl text-5xl font-bold leading-none md:text-7xl">
        Team Explore
      </h1>

      <p class="mt-6 max-w-2xl text-lg leading-8 text-app-muted">
        Home, categories, stores, recommendations, header and footer.
      </p>

      <div class="mt-8 flex flex-wrap gap-4">
        <span class="rounded-full bg-primary px-4 py-2 font-bold text-white">
          Home
        </span>

        <span class="rounded-full border border-app-border px-4 py-2">
          Categories
        </span>

        <span class="rounded-full border border-app-border px-4 py-2">
          Stores
        </span>
      </div>
    </div>
  </section>

  <section class="mx-auto max-w-7xl px-page pb-section">
    <h2 class="mb-6 text-2xl font-bold text-app-text">Featured Products</h2>

    @if (selectedProductId()) {
      <p class="mb-4 text-sm text-app-muted">
        Selected: <strong>{{ selectedProductId() }}</strong>
      </p>
    }

    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (product of products; track product.id) {
        <ts-product-card
          [product]="product"
          (selected)="onProductSelected($event)"
        />
      }
    </div>
  </section>
</main>
